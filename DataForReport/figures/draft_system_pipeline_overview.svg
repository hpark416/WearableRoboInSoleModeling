<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300" role="img" aria-label="Wearable insole modeling pipeline overview">
  <defs>
    <marker id="arrowEnd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3a5f"/>
    </marker>
    <marker id="arrowEndLight" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#0f172a">
    Wearable insole modeling pipeline (draft)
  </text>
  <text x="460" y="48" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">
    Parameter definition ’ simulation ’ objectives ’ sweeps / optimization / analysis
  </text>

  <!-- Stage 1 -->
  <rect x="32" y="88" width="168" height="100" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="116" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">1. Parameters</text>
  <text x="116" y="138" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">Sole: K_shoe, thickness</text>
  <text x="116" y="154" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">or spline F”x tables</text>
  <text x="116" y="170" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">Task: des_dpMass, amplitude</text>

  <!-- Arrow 1-2 -->
  <line x1="200" y1="138" x2="248" y2="138" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrowEnd)"/>

  <!-- Stage 2 -->
  <rect x="252" y="88" width="168" height="100" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="336" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">2. Simulation</text>
  <text x="336" y="142" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1e40af">FullHopper_*</text>
  <text x="336" y="160" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">Simulink hopper + sole</text>

  <!-- Arrow 2-3 -->
  <line x1="420" y1="138" x2="468" y2="138" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrowEnd)"/>

  <!-- Stage 3 -->
  <rect x="472" y="88" width="188" height="100" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="566" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">3. Objective extraction</text>
  <text x="566" y="138" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">max_GRF, max_dpMass</text>
  <text x="566" y="154" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">mean_Pmet, amplitude_res</text>
  <text x="566" y="172" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#94a3b8">analyze_sole_output (+ extended)</text>

  <!-- Arrow 3-4 -->
  <line x1="660" y1="138" x2="708" y2="138" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrowEnd)"/>

  <!-- Stage 4 -->
  <rect x="712" y="78" width="176" height="120" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="800" y="104" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#0f172a">4. Outputs</text>
  <text x="800" y="126" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">" Grid sweep</text>
  <text x="800" y="142" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#64748b">gen_sweep_data</text>
  <text x="800" y="162" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">" Bayesian optimization</text>
  <text x="800" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#64748b">bayesian_optimization_spline</text>
  <text x="800" y="196" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#475569">" Analysis / figures</text>

  <!-- Footnote -->
  <text x="460" y="248" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#94a3b8">
    MatlabCode/  replace model names and script labels for final figure; print-safe grayscale OK.
  </text>

  <text x="460" y="276" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#cbd5e1" font-weight="600">DRAFT</text>
</svg>
